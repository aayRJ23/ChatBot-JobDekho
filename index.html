<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Portal Chatbot — Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 16px; }
    .container { background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); width: 100%; max-width: 560px; overflow: hidden; }
    .header { background: #007bff; color: white; padding: 18px 20px; font-size: 18px; font-weight: bold; }
    .header small { font-weight: normal; font-size: 12px; opacity: 0.8; display: block; margin-top: 2px; }
    #chat-box { height: 360px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
    .msg.bot { background: #f1f1f1; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.error { background: #ffe0e0; align-self: flex-start; color: #c00; }
    .input-row { display: flex; border-top: 1px solid #eee; padding: 12px; gap: 8px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #007bff; }
    button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { background: #0056b3; }
    button:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      🤖 AskMeAnything Bot
      <small>Standalone test page — not the React frontend</small>
    </div>
    <div id="chat-box">
      <div class="msg bot">Hello! How can I help you today?</div>
    </div>
    <div class="input-row">
      <input type="text" id="user-input" placeholder="Type your question and press Enter…" />
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('user-input');
    const btn   = document.getElementById('send-btn');
    const box   = document.getElementById('chat-box');

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    function appendMessage(text, type) {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      appendMessage(text, 'user');
      input.value = '';
      btn.disabled = true;

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 'User Input': text })
        });
        const data = await res.json();
        if (data.Prediction) {
          appendMessage(data.Prediction, 'bot');
        } else {
          appendMessage('Error: ' + (data.error || 'Unknown error'), 'error');
        }
      } catch (err) {
        appendMessage('Could not reach the server. Is Flask running?', 'error');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
